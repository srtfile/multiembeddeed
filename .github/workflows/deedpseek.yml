name: deedpseek
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: 'lint | resolve | serve'
        default: lint
      url:
        description: 'URL to resolve (resolve mode)'
        default: 'https://multiembed.mov/?video_id=1339713&tmdb=1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install curl_cffi>=0.7.0
      - run: python -m py_compile deedpseek.py && echo "Syntax OK"
      - run: |
          python -c "
          import sys, types
          sys.modules.setdefault('nodriver', types.ModuleType('nodriver'))
          import deedpseek
          assert deedpseek.HAS_CURL_CFFI
          assert not deedpseek.HAS_NODRIVER
          assert deedpseek._is_ci()
          print('Import guard OK')
          "

  resolve:
    needs: lint
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'resolve'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install curl_cffi>=0.7.0
      - run: python deedpseek.py "${{ inputs.url }}" | tee result.json
      - uses: actions/upload-artifact@v4
        with: { name: result, path: result.json }

  serve:
    needs: lint
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'serve'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install curl_cffi>=0.7.0
      - run: python deedpseek.py --serve --host 0.0.0.0 --port 8787 &
      - run: |
          for i in $(seq 20); do
            curl -sf http://localhost:8787/health && break || sleep 1
          done
          curl -sf http://localhost:8787/health | python -m json.tool
