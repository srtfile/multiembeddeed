name: Stream Resolver

on:
  workflow_dispatch:
    inputs:
      url:
        description: "multiembed.mov URL to resolve"
        required: true
        default: "https://multiembed.mov/?video_id=1339713&tmdb=1"
      server_id:
        description: "Specific server ID (leave blank for all)"
        required: false
        default: ""
      single:
        description: "Single server only (true/false)"
        required: false
        default: "false"

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Google Chrome (stable) ────────────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      # ── 4. Smoke-test Chrome can actually launch ──────────────────────────
      #    If this fails, we see the real crash reason before nodriver hides it.
      - name: Smoke-test Chrome headless
        run: |
          timeout 10 google-chrome \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --dump-dom \
            about:blank 2>&1 | tail -5 || true

      # ── 5. Install Python deps ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install nodriver

      # ── 6. Run resolver ───────────────────────────────────────────────────
      - name: Run deedpseek.py
        env:
          CI: "true"
          # Give Chrome a writable tmpdir in the workspace (avoids /tmp permission issues)
          TMPDIR: "${{ github.workspace }}/.chrome-tmp"
        run: |
          mkdir -p "${{ github.workspace }}/.chrome-tmp"
          ARGS="${{ github.event.inputs.url }}"
          if [ -n "${{ github.event.inputs.server_id }}" ]; then
            ARGS="$ARGS --server-id ${{ github.event.inputs.server_id }}"
          fi
          if [ "${{ github.event.inputs.single }}" = "true" ]; then
            ARGS="$ARGS --single"
          fi
          python deedpseek.py $ARGS | tee result.json

      # ── 7. Upload result ──────────────────────────────────────────────────
      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: resolve-result
          path: result.json
          retention-days: 3
