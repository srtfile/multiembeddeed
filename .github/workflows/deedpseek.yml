name: Stream Resolver

on:
  workflow_dispatch:
    inputs:
      url:
        description: "multiembed.mov URL to resolve"
        required: true
        default: "https://multiembed.mov/?video_id=1339713&tmdb=1"
      server_id:
        description: "Specific server ID (leave blank for all)"
        required: false
        default: ""
      single:
        description: "Single server only (true/false)"
        required: false
        default: "false"

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Google Chrome (stable) ────────────────────────────────
      #    nodriver drives a real Chrome binary; the ubuntu-latest runner
      #    ships without it, so we install it here.
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            https://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. Install Python deps ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install nodriver

      # ── 5. Run resolver ───────────────────────────────────────────────────
      - name: Run deedpseek.py
        env:
          CI: "true"          # triggers headless=True in the script
        run: |
          ARGS="${{ github.event.inputs.url }}"
          if [ -n "${{ github.event.inputs.server_id }}" ]; then
            ARGS="$ARGS --server-id ${{ github.event.inputs.server_id }}"
          fi
          if [ "${{ github.event.inputs.single }}" = "true" ]; then
            ARGS="$ARGS --single"
          fi
          python deedpseek.py $ARGS | tee result.json

      # ── 6. Upload result ──────────────────────────────────────────────────
      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: resolve-result
          path: result.json
          retention-days: 3
